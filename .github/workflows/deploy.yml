name: Deploy to Cloud Run

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cloud-run-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-cloud-run:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'develop' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Service Account Key)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Build Cloud Run env file
        shell: bash
        env:
          APP_PROJECT_NAME: ${{ secrets.APP_PROJECT_NAME }}
          APP_API_V1_STR: ${{ secrets.APP_API_V1_STR }}
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
          APP_ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.APP_ACCESS_TOKEN_EXPIRE_MINUTES }}
          APP_ALGORITHM: ${{ secrets.APP_ALGORITHM }}
          APP_CORS_ORIGINS: ${{ secrets.APP_CORS_ORIGINS }}
          APP_MONGODB_URI: ${{ secrets.APP_MONGODB_URI }}
          APP_MONGODB_DB: ${{ secrets.APP_MONGODB_DB }}
          APP_GEMINI_API_KEY: ${{ secrets.APP_GEMINI_API_KEY }}
          APP_GEMINI_MODEL: ${{ secrets.APP_GEMINI_MODEL }}
          APP_DEFAULT_LOGIN_PASSWORD: ${{ secrets.APP_DEFAULT_LOGIN_PASSWORD }}
          APP_SIGNUP_OTP_EXPIRY_MINUTES: ${{ secrets.APP_SIGNUP_OTP_EXPIRY_MINUTES }}
          APP_SIGNUP_OTP_LENGTH: ${{ secrets.APP_SIGNUP_OTP_LENGTH }}
          APP_SMTP_HOST: ${{ secrets.APP_SMTP_HOST }}
          APP_SMTP_PORT: ${{ secrets.APP_SMTP_PORT }}
          APP_SMTP_USERNAME: ${{ secrets.APP_SMTP_USERNAME }}
          APP_SMTP_PASSWORD: ${{ secrets.APP_SMTP_PASSWORD }}
          APP_SMTP_USE_TLS: ${{ secrets.APP_SMTP_USE_TLS }}
          APP_SMTP_USE_SSL: ${{ secrets.APP_SMTP_USE_SSL }}
          APP_SMTP_TIMEOUT_SECONDS: ${{ secrets.APP_SMTP_TIMEOUT_SECONDS }}
          APP_SMTP_FROM_EMAIL: ${{ secrets.APP_SMTP_FROM_EMAIL }}
          APP_SMTP_BCC_EMAILS: ${{ secrets.APP_SMTP_BCC_EMAILS }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          env_map = {
              "PROJECT_NAME": os.environ.get("APP_PROJECT_NAME") or "Secure FastAPI",
              "API_V1_STR": os.environ.get("APP_API_V1_STR") or "/api/v1",
              "SECRET_KEY": os.environ.get("APP_SECRET_KEY") or "",
              "ACCESS_TOKEN_EXPIRE_MINUTES": os.environ.get("APP_ACCESS_TOKEN_EXPIRE_MINUTES") or "30",
              "ALGORITHM": os.environ.get("APP_ALGORITHM") or "HS256",
              "CORS_ORIGINS": os.environ.get("APP_CORS_ORIGINS") or '["http://localhost:3000","http://localhost:5173","http://127.0.0.1:3000","http://127.0.0.1:5173"]',
              "MONGODB_URI": os.environ.get("APP_MONGODB_URI") or "mongodb://localhost:27017",
              "MONGODB_DB": os.environ.get("APP_MONGODB_DB") or "my_finance",
              "GEMINI_API_KEY": os.environ.get("APP_GEMINI_API_KEY") or "",
              "GEMINI_MODEL": os.environ.get("APP_GEMINI_MODEL") or "gemini-2.5-flash",
              "DEFAULT_LOGIN_PASSWORD": os.environ.get("APP_DEFAULT_LOGIN_PASSWORD") or "",
              "SIGNUP_OTP_EXPIRY_MINUTES": os.environ.get("APP_SIGNUP_OTP_EXPIRY_MINUTES") or "2",
              "SIGNUP_OTP_LENGTH": os.environ.get("APP_SIGNUP_OTP_LENGTH") or "6",
              "SMTP_HOST": os.environ.get("APP_SMTP_HOST") or "",
              "SMTP_PORT": os.environ.get("APP_SMTP_PORT") or "587",
              "SMTP_USERNAME": os.environ.get("APP_SMTP_USERNAME") or "",
              "SMTP_PASSWORD": os.environ.get("APP_SMTP_PASSWORD") or "",
              "SMTP_USE_TLS": os.environ.get("APP_SMTP_USE_TLS") or "true",
              "SMTP_USE_SSL": os.environ.get("APP_SMTP_USE_SSL") or "false",
              "SMTP_TIMEOUT_SECONDS": os.environ.get("APP_SMTP_TIMEOUT_SECONDS") or "15",
              "SMTP_FROM_EMAIL": os.environ.get("APP_SMTP_FROM_EMAIL") or "no-reply@my-finance.local",
              "SMTP_BCC_EMAILS": os.environ.get("APP_SMTP_BCC_EMAILS") or '["no-reply@harpytechco.in"]',
          }

          required_keys = ["SECRET_KEY", "MONGODB_URI", "DEFAULT_LOGIN_PASSWORD"]
          missing_keys = [key for key in required_keys if not env_map[key]]
          if missing_keys:
              raise SystemExit(f"Missing required GitHub secrets: {', '.join(f'APP_{key}' for key in missing_keys)}")

          lines = []
          for key, value in env_map.items():
              encoded = json.dumps(str(value))
              lines.append(f"{key}: {encoded}")

          Path(".cloudrun.env.yaml").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Resolve deploy parameters
        shell: bash
        run: |
          # Determine environment suffix from branch name
          BRANCH="${GITHUB_REF_NAME}"
          if [ "${BRANCH}" = "main" ]; then
            ENV="prod"
            DEFAULT_REGION="us-central1"
          else
            ENV="dev"
            DEFAULT_REGION="us-east1"
          fi

          REGION="${{ secrets.GCP_REGION }}"
          if [ -z "${REGION}" ]; then
            REGION="${DEFAULT_REGION}"
          fi

          BASE_SERVICE="${{ secrets.CLOUD_RUN_SERVICE }}"
          if [ -z "${BASE_SERVICE}" ]; then
            BASE_SERVICE="finance"
          fi

          # Strip any existing env suffix then re-apply the correct one
          BASE_SERVICE="${BASE_SERVICE%-dev}"
          BASE_SERVICE="${BASE_SERVICE%-prod}"
          SERVICE_NAME="${BASE_SERVICE}-${ENV}"

          AR_REPOSITORY="${SERVICE_NAME}"
          AR_HOST="${REGION}-docker.pkg.dev"
          IMAGE_URI="${AR_HOST}/${{ secrets.GCP_PROJECT_ID }}/${AR_REPOSITORY}/${SERVICE_NAME}:${{ github.sha }}"

          echo "REGION=${REGION}" >> "$GITHUB_ENV"
          echo "SERVICE_NAME=${SERVICE_NAME}" >> "$GITHUB_ENV"
          echo "AR_REPOSITORY=${AR_REPOSITORY}" >> "$GITHUB_ENV"
          echo "AR_HOST=${AR_HOST}" >> "$GITHUB_ENV"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Ensure Artifact Registry repository exists
        shell: bash
        run: |
          if ! gcloud artifacts repositories describe "${AR_REPOSITORY}" --location "${REGION}" --project "${{ secrets.GCP_PROJECT_ID }}" > /dev/null 2>&1; then
            gcloud artifacts repositories create "${AR_REPOSITORY}" \
              --repository-format=docker \
              --location "${REGION}" \
              --description "Docker images for ${SERVICE_NAME}" \
              --project "${{ secrets.GCP_PROJECT_ID }}"
          fi

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${AR_HOST}" --quiet

      - name: Build Docker image
        run: |
          docker build -t "${IMAGE_URI}" .

      - name: Push image to Artifact Registry
        run: |
          docker push "${IMAGE_URI}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --image "${IMAGE_URI}" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8000 \
            --cpu 2 \
            --memory 4Gi \
            --cpu-boost \
            --execution-environment gen2 \
            --update-env-vars "BUILD_VERSION=${{ github.sha }}" \
            --env-vars-file .cloudrun.env.yaml \
            --quiet
