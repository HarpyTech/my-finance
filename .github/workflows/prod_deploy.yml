name: Deploy to GKE (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-gke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-gke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Service Account Key)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Resolve deploy parameters
        shell: bash
        run: |
          REGION="${{ secrets.GCP_REGION }}"
          if [ -z "${REGION}" ]; then
            REGION="us-central1"
          fi

          CLUSTER_NAME="${{ secrets.GKE_CLUSTER_NAME }}"
          if [ -z "${CLUSTER_NAME}" ]; then
            CLUSTER_NAME="harpy-finance-dev"
          fi

          GKE_LOCATION="${{ secrets.GKE_LOCATION }}"
          if [ -z "${GKE_LOCATION}" ]; then
            GKE_LOCATION="${REGION}"
          fi

          DISCOVERED_LOCATION=$(gcloud container clusters list \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --format="value(location)" \
            --filter="name=${CLUSTER_NAME}" \
            | head -n 1)

          if [ -z "${DISCOVERED_LOCATION}" ]; then
            echo "ERROR: Could not find GKE cluster '${CLUSTER_NAME}' in project '${{ secrets.GCP_PROJECT_ID }}'." >&2
            exit 1
          fi

          if [ "${GKE_LOCATION}" != "${DISCOVERED_LOCATION}" ]; then
            echo "Using discovered cluster location '${DISCOVERED_LOCATION}' instead of configured location '${GKE_LOCATION}'."
            GKE_LOCATION="${DISCOVERED_LOCATION}"
          fi

          K8S_NAMESPACE="${{ secrets.GKE_NAMESPACE }}"
          if [ -z "${K8S_NAMESPACE}" ]; then
            K8S_NAMESPACE="finance"
          fi

          APP_BASE_NAME="${{ secrets.GKE_APP_NAME }}"
          if [ -z "${APP_BASE_NAME}" ]; then
            APP_BASE_NAME="finance"
          fi

          HOSTNAME="${{ secrets.GKE_HOSTNAME }}"
          if [ -z "${HOSTNAME}" ]; then
            HOSTNAME="${APP_BASE_NAME}.harpytechco.in"
          fi

          STATIC_IP_NAME="${{ secrets.GKE_STATIC_IP_NAME }}"
          if [ -z "${STATIC_IP_NAME}" ]; then
            STATIC_IP_NAME="${APP_BASE_NAME}-ingress-ip"
          fi

          MANAGED_CERT_NAME="${APP_BASE_NAME}-managed-cert"
          FRONTEND_CONFIG_NAME="${APP_BASE_NAME}-frontend-config"
          BACKEND_CONFIG_NAME="${APP_BASE_NAME}-backend-config"

          POD_NAME="${APP_BASE_NAME}-pod"
          SERVICE_NAME="${APP_BASE_NAME}-srv"
          DEPLOYMENT_NAME="${APP_BASE_NAME}-deployment"
          SECRET_NAME="${APP_BASE_NAME}-secrets"
          INGRESS_NAME="${APP_BASE_NAME}-ingress"
          HPA_NAME="${APP_BASE_NAME}-hpa"
          PDB_NAME="${APP_BASE_NAME}-pdb"

          AR_REPOSITORY="${CLUSTER_NAME}"
          AR_HOST="${REGION}-docker.pkg.dev"
          IMAGE_URI="${AR_HOST}/${{ secrets.GCP_PROJECT_ID }}/${AR_REPOSITORY}/${APP_BASE_NAME}:${{ github.sha }}"

          echo "REGION=${REGION}" >> "$GITHUB_ENV"
          echo "CLUSTER_NAME=${CLUSTER_NAME}" >> "$GITHUB_ENV"
          echo "GKE_LOCATION=${GKE_LOCATION}" >> "$GITHUB_ENV"
          echo "K8S_NAMESPACE=${K8S_NAMESPACE}" >> "$GITHUB_ENV"
          echo "APP_BASE_NAME=${APP_BASE_NAME}" >> "$GITHUB_ENV"
          echo "HOSTNAME=${HOSTNAME}" >> "$GITHUB_ENV"
          echo "STATIC_IP_NAME=${STATIC_IP_NAME}" >> "$GITHUB_ENV"
          echo "MANAGED_CERT_NAME=${MANAGED_CERT_NAME}" >> "$GITHUB_ENV"
          echo "FRONTEND_CONFIG_NAME=${FRONTEND_CONFIG_NAME}" >> "$GITHUB_ENV"
          echo "BACKEND_CONFIG_NAME=${BACKEND_CONFIG_NAME}" >> "$GITHUB_ENV"
          echo "POD_NAME=${POD_NAME}" >> "$GITHUB_ENV"
          echo "SERVICE_NAME=${SERVICE_NAME}" >> "$GITHUB_ENV"
          echo "DEPLOYMENT_NAME=${DEPLOYMENT_NAME}" >> "$GITHUB_ENV"
          echo "SECRET_NAME=${SECRET_NAME}" >> "$GITHUB_ENV"
          echo "INGRESS_NAME=${INGRESS_NAME}" >> "$GITHUB_ENV"
          echo "HPA_NAME=${HPA_NAME}" >> "$GITHUB_ENV"
          echo "PDB_NAME=${PDB_NAME}" >> "$GITHUB_ENV"
          echo "AR_REPOSITORY=${AR_REPOSITORY}" >> "$GITHUB_ENV"
          echo "AR_HOST=${AR_HOST}" >> "$GITHUB_ENV"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Ensure global static IP exists
        shell: bash
        run: |
          if ! gcloud compute addresses describe "${STATIC_IP_NAME}" --global --project "${{ secrets.GCP_PROJECT_ID }}" > /dev/null 2>&1; then
            gcloud compute addresses create "${STATIC_IP_NAME}" \
              --global \
              --project "${{ secrets.GCP_PROJECT_ID }}"
          fi

          STATIC_IP=$(gcloud compute addresses describe "${STATIC_IP_NAME}" \
            --global \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --format='value(address)')

          echo "STATIC_IP=${STATIC_IP}" >> "$GITHUB_ENV"

      - name: Validate GKE cluster exists
        shell: bash
        run: |
          gcloud container clusters describe "${CLUSTER_NAME}" \
            --location "${GKE_LOCATION}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" > /dev/null

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.GKE_LOCATION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Build Kubernetes env file
        shell: bash
        env:
          APP_PROJECT_NAME: ${{ secrets.APP_PROJECT_NAME }}
          APP_API_V1_STR: ${{ secrets.APP_API_V1_STR }}
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
          APP_ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.APP_ACCESS_TOKEN_EXPIRE_MINUTES }}
          APP_ALGORITHM: ${{ secrets.APP_ALGORITHM }}
          APP_CORS_ORIGINS: ${{ secrets.APP_CORS_ORIGINS }}
          APP_DEFAULT_LOGIN_PASSWORD: ${{ secrets.APP_DEFAULT_LOGIN_PASSWORD }}
          APP_MONGODB_URI: ${{ secrets.APP_MONGODB_URI }}
          APP_MONGODB_DB: ${{ secrets.APP_MONGODB_DB }}
          APP_GEMINI_API_KEY: ${{ secrets.APP_GEMINI_API_KEY }}
          APP_GEMINI_MODEL: ${{ secrets.APP_GEMINI_MODEL }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python - << 'PY'
          import os
          import sys

          # Validate required secrets are present and meet minimum requirements
          required = {
              "APP_SECRET_KEY": os.getenv("APP_SECRET_KEY", ""),
              "APP_DEFAULT_LOGIN_PASSWORD": os.getenv("APP_DEFAULT_LOGIN_PASSWORD", ""),
              "APP_MONGODB_URI": os.getenv("APP_MONGODB_URI", ""),
          }
          missing = [k for k, v in required.items() if not v]
          if missing:
              print(f"ERROR: Required secrets are not set: {', '.join(missing)}", file=sys.stderr)
              sys.exit(1)
          if len(required["APP_SECRET_KEY"]) < 32:
              print("ERROR: APP_SECRET_KEY must be at least 32 characters long.", file=sys.stderr)
              sys.exit(1)

          lines = []

          def add_env(key, env_var):
              value = os.getenv(env_var)
              if value:
                  lines.append(f"{key}={value}")

          add_env("SECRET_KEY", "APP_SECRET_KEY")
          add_env("DEFAULT_LOGIN_PASSWORD", "APP_DEFAULT_LOGIN_PASSWORD")
          add_env("MONGODB_URI", "APP_MONGODB_URI")
          lines.append(f"BUILD_VERSION={os.getenv('GITHUB_SHA', '')}")
          add_env("PROJECT_NAME", "APP_PROJECT_NAME")
          add_env("API_V1_STR", "APP_API_V1_STR")
          add_env("ACCESS_TOKEN_EXPIRE_MINUTES", "APP_ACCESS_TOKEN_EXPIRE_MINUTES")
          add_env("ALGORITHM", "APP_ALGORITHM")
          add_env("CORS_ORIGINS", "APP_CORS_ORIGINS")
          add_env("MONGODB_DB", "APP_MONGODB_DB")
          add_env("GEMINI_API_KEY", "APP_GEMINI_API_KEY")
          add_env("GEMINI_MODEL", "APP_GEMINI_MODEL")

          with open(".k8s.env", "w", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")
          PY

      - name: Ensure Artifact Registry repository exists
        shell: bash
        run: |
          if ! gcloud artifacts repositories describe "${AR_REPOSITORY}" --location "${REGION}" --project "${{ secrets.GCP_PROJECT_ID }}" > /dev/null 2>&1; then
            gcloud artifacts repositories create "${AR_REPOSITORY}" \
              --repository-format=docker \
              --location "${REGION}" \
                --description "Docker images for ${APP_BASE_NAME}" \
              --project "${{ secrets.GCP_PROJECT_ID }}"
          fi

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${AR_HOST}" --quiet

      - name: Build Docker image
        run: |
          docker build -t "${IMAGE_URI}" .

      - name: Push image to Artifact Registry
        run: |
          docker push "${IMAGE_URI}"

      - name: Ensure namespace exists
        shell: bash
        run: |
          kubectl get namespace "${K8S_NAMESPACE}" > /dev/null 2>&1 || kubectl create namespace "${K8S_NAMESPACE}"

      - name: Create or update app secrets
        shell: bash
        run: |
          kubectl -n "${K8S_NAMESPACE}" create secret generic "${SECRET_NAME}" \
            --from-env-file=.k8s.env \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy workload to GKE
        shell: bash
        run: |
          cat <<EOF | kubectl apply -n "${K8S_NAMESPACE}" -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${DEPLOYMENT_NAME}
            labels:
              app: ${POD_NAME}
          spec:
            replicas: 2
            strategy:
              type: RollingUpdate
              rollingUpdate:
                maxSurge: 1
                maxUnavailable: 0
            selector:
              matchLabels:
                app: ${POD_NAME}
            template:
              metadata:
                labels:
                  app: ${POD_NAME}
              spec:
                terminationGracePeriodSeconds: 30
                containers:
                  - name: ${POD_NAME}
                    image: ${IMAGE_URI}
                    imagePullPolicy: Always
                    ports:
                      - containerPort: 8000
                    envFrom:
                      - secretRef:
                          name: ${SECRET_NAME}
                    resources:
                      requests:
                        cpu: "250m"
                        memory: "256Mi"
                      limits:
                        cpu: "1000m"
                        memory: "512Mi"
                    readinessProbe:
                      httpGet:
                        path: /health
                        port: 8000
                      initialDelaySeconds: 10
                      periodSeconds: 10
                      timeoutSeconds: 2
                      failureThreshold: 6
                    livenessProbe:
                      httpGet:
                        path: /health
                        port: 8000
                      initialDelaySeconds: 30
                      periodSeconds: 15
                      timeoutSeconds: 2
                      failureThreshold: 4
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${SERVICE_NAME}
            labels:
              app: ${POD_NAME}
            annotations:
              cloud.google.com/neg: '{"ingress": true}'
              cloud.google.com/backend-config: '{"default":"${BACKEND_CONFIG_NAME}"}'
              external-dns.alpha.kubernetes.io/hostname: ${HOSTNAME}.
          spec:
            selector:
              app: ${POD_NAME}
            ports:
              - name: http
                port: 80
                targetPort: 8000
            type: ClusterIP
          ---
          apiVersion: cloud.google.com/v1
          kind: BackendConfig
          metadata:
            name: ${BACKEND_CONFIG_NAME}
          spec:
            timeoutSec: 60
            healthCheck:
              type: HTTP
              requestPath: /health
              port: 8000
              checkIntervalSec: 15
              timeoutSec: 5
              healthyThreshold: 1
              unhealthyThreshold: 3
          ---
          apiVersion: networking.gke.io/v1
          kind: ManagedCertificate
          metadata:
            name: ${MANAGED_CERT_NAME}
          spec:
            domains:
              - ${HOSTNAME}
          ---
          apiVersion: networking.gke.io/v1beta1
          kind: FrontendConfig
          metadata:
            name: ${FRONTEND_CONFIG_NAME}
          spec:
            redirectToHttps:
              enabled: true
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ${INGRESS_NAME}
            annotations:
              kubernetes.io/ingress.class: gce
              kubernetes.io/ingress.global-static-ip-name: ${STATIC_IP_NAME}
              kubernetes.io/ingress.allow-http: "true"
              networking.gke.io/managed-certificates: ${MANAGED_CERT_NAME}
              networking.gke.io/v1beta1.FrontendConfig: ${FRONTEND_CONFIG_NAME}
              external-dns.alpha.kubernetes.io/hostname: ${HOSTNAME}.
          spec:
            rules:
              - host: ${HOSTNAME}
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: ${SERVICE_NAME}
                          port:
                            number: 80
          ---
          apiVersion: policy/v1
          kind: PodDisruptionBudget
          metadata:
            name: ${PDB_NAME}
          spec:
            minAvailable: 1
            selector:
              matchLabels:
                app: ${POD_NAME}
          ---
          apiVersion: autoscaling/v2
          kind: HorizontalPodAutoscaler
          metadata:
            name: ${HPA_NAME}
          spec:
            scaleTargetRef:
              apiVersion: apps/v1
              kind: Deployment
              name: ${DEPLOYMENT_NAME}
            minReplicas: 2
            maxReplicas: 5
            metrics:
              - type: Resource
                resource:
                  name: cpu
                  target:
                    type: Utilization
                    averageUtilization: 70
              - type: Resource
                resource:
                  name: memory
                  target:
                    type: Utilization
                    averageUtilization: 75
          EOF

      - name: Wait for rollout
        shell: bash
        run: |
          kubectl rollout status deployment/"${DEPLOYMENT_NAME}" -n "${K8S_NAMESPACE}" --timeout=300s

      - name: Wait for ingress IP
        shell: bash
        run: |
          for attempt in $(seq 1 30); do
            INGRESS_IP=$(kubectl get ingress "${INGRESS_NAME}" -n "${K8S_NAMESPACE}" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2> /dev/null)
            if [ -n "${INGRESS_IP}" ]; then
              echo "INGRESS_IP=${INGRESS_IP}" >> "$GITHUB_ENV"
              echo "Ingress IP: ${INGRESS_IP}"
              break
            fi
            echo "Waiting for ingress IP allocation..."
            sleep 10
          done

      - name: Wait for managed certificate
        shell: bash
        run: |
          for attempt in $(seq 1 60); do
            CERT_STATUS=$(kubectl get managedcertificate "${MANAGED_CERT_NAME}" -n "${K8S_NAMESPACE}" -o jsonpath='{.status.certificateStatus}' 2> /dev/null)
            if [ "${CERT_STATUS}" = "Active" ]; then
              echo "Managed certificate is active."
              exit 0
            fi
            echo "Managed certificate status: ${CERT_STATUS:-pending}"
            sleep 10
          done

          echo "Managed certificate is still provisioning. HTTPS may not be ready yet."

      - name: Print DNS configuration
        shell: bash
        run: |
          echo "Application hostname: ${HOSTNAME}"
          echo "Reserved global IP: ${STATIC_IP}"
          if [ -n "${INGRESS_IP}" ]; then
            echo "Ingress IP: ${INGRESS_IP}"
            echo "Create or update an A record pointing ${HOSTNAME} to ${STATIC_IP}."
          else
            echo "Ingress IP is not ready yet. The reserved global IP is ${STATIC_IP}."
            echo "Re-run: kubectl get ingress ${INGRESS_NAME} -n ${K8S_NAMESPACE}"
          fi
          echo "Managed certificate: ${MANAGED_CERT_NAME}"
          echo "HTTPS will serve once DNS resolves to the reserved IP and the managed certificate becomes Active."