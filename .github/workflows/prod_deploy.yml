name: Deploy to GKE (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-gke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-gke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Service Account Key)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Resolve deploy parameters
        shell: bash
        run: |
          REGION="${{ secrets.GCP_REGION }}"
          if [ -z "${REGION}" ]; then
            REGION="us-central1"
          fi

          CLUSTER_NAME="${{ secrets.GKE_CLUSTER_NAME }}"
          if [ -z "${CLUSTER_NAME}" ]; then
            CLUSTER_NAME="harpy-finance-dev"
          fi

          GKE_LOCATION="${{ secrets.GKE_LOCATION }}"
          if [ -z "${GKE_LOCATION}" ]; then
            GKE_LOCATION="${REGION}"
          fi

          DISCOVERED_LOCATION=$(gcloud container clusters list \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --format="value(location)" \
            --filter="name=${CLUSTER_NAME}" \
            | head -n 1)

          if [ -z "${DISCOVERED_LOCATION}" ]; then
            echo "ERROR: Could not find GKE cluster '${CLUSTER_NAME}' in project '${{ secrets.GCP_PROJECT_ID }}'." >&2
            exit 1
          fi

          if [ "${GKE_LOCATION}" != "${DISCOVERED_LOCATION}" ]; then
            echo "Using discovered cluster location '${DISCOVERED_LOCATION}' instead of configured location '${GKE_LOCATION}'."
            GKE_LOCATION="${DISCOVERED_LOCATION}"
          fi

          K8S_NAMESPACE="${{ secrets.GKE_NAMESPACE }}"
          if [ -z "${K8S_NAMESPACE}" ]; then
            K8S_NAMESPACE="finance"
          fi

          APP_BASE_NAME="${{ secrets.GKE_APP_NAME }}"
          if [ -z "${APP_BASE_NAME}" ]; then
            APP_BASE_NAME="finance"
          fi

          POD_NAME="${APP_BASE_NAME}-pod"
          SERVICE_NAME="${APP_BASE_NAME}-srv"
          DEPLOYMENT_NAME="${APP_BASE_NAME}-deployment"
          SECRET_NAME="${APP_BASE_NAME}-secrets"

          AR_REPOSITORY="${CLUSTER_NAME}"
          AR_HOST="${REGION}-docker.pkg.dev"
          IMAGE_URI="${AR_HOST}/${{ secrets.GCP_PROJECT_ID }}/${AR_REPOSITORY}/${APP_BASE_NAME}:${{ github.sha }}"

          echo "REGION=${REGION}" >> "$GITHUB_ENV"
          echo "CLUSTER_NAME=${CLUSTER_NAME}" >> "$GITHUB_ENV"
          echo "GKE_LOCATION=${GKE_LOCATION}" >> "$GITHUB_ENV"
          echo "K8S_NAMESPACE=${K8S_NAMESPACE}" >> "$GITHUB_ENV"
          echo "APP_BASE_NAME=${APP_BASE_NAME}" >> "$GITHUB_ENV"
          echo "POD_NAME=${POD_NAME}" >> "$GITHUB_ENV"
          echo "SERVICE_NAME=${SERVICE_NAME}" >> "$GITHUB_ENV"
          echo "DEPLOYMENT_NAME=${DEPLOYMENT_NAME}" >> "$GITHUB_ENV"
          echo "SECRET_NAME=${SECRET_NAME}" >> "$GITHUB_ENV"
          echo "AR_REPOSITORY=${AR_REPOSITORY}" >> "$GITHUB_ENV"
          echo "AR_HOST=${AR_HOST}" >> "$GITHUB_ENV"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Validate GKE cluster exists
        shell: bash
        run: |
          gcloud container clusters describe "${CLUSTER_NAME}" \
            --location "${GKE_LOCATION}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" > /dev/null

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.GKE_LOCATION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Build Kubernetes env file
        shell: bash
        env:
          APP_PROJECT_NAME: ${{ secrets.APP_PROJECT_NAME }}
          APP_API_V1_STR: ${{ secrets.APP_API_V1_STR }}
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
          APP_ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.APP_ACCESS_TOKEN_EXPIRE_MINUTES }}
          APP_ALGORITHM: ${{ secrets.APP_ALGORITHM }}
          APP_CORS_ORIGINS: ${{ secrets.APP_CORS_ORIGINS }}
          APP_DEFAULT_LOGIN_PASSWORD: ${{ secrets.APP_DEFAULT_LOGIN_PASSWORD }}
          APP_MONGODB_URI: ${{ secrets.APP_MONGODB_URI }}
          APP_MONGODB_DB: ${{ secrets.APP_MONGODB_DB }}
          APP_GEMINI_API_KEY: ${{ secrets.APP_GEMINI_API_KEY }}
          APP_GEMINI_MODEL: ${{ secrets.APP_GEMINI_MODEL }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python - << 'PY'
          import os
          import sys

          # Validate required secrets are present and meet minimum requirements
          required = {
              "APP_SECRET_KEY": os.getenv("APP_SECRET_KEY", ""),
              "APP_DEFAULT_LOGIN_PASSWORD": os.getenv("APP_DEFAULT_LOGIN_PASSWORD", ""),
              "APP_MONGODB_URI": os.getenv("APP_MONGODB_URI", ""),
          }
          missing = [k for k, v in required.items() if not v]
          if missing:
              print(f"ERROR: Required secrets are not set: {', '.join(missing)}", file=sys.stderr)
              sys.exit(1)
          if len(required["APP_SECRET_KEY"]) < 32:
              print("ERROR: APP_SECRET_KEY must be at least 32 characters long.", file=sys.stderr)
              sys.exit(1)

          lines = []

          def add_env(key, env_var):
              value = os.getenv(env_var)
              if value:
                  lines.append(f"{key}={value}")

          add_env("SECRET_KEY", "APP_SECRET_KEY")
          add_env("DEFAULT_LOGIN_PASSWORD", "APP_DEFAULT_LOGIN_PASSWORD")
          add_env("MONGODB_URI", "APP_MONGODB_URI")
          lines.append(f"BUILD_VERSION={os.getenv('GITHUB_SHA', '')}")
          add_env("PROJECT_NAME", "APP_PROJECT_NAME")
          add_env("API_V1_STR", "APP_API_V1_STR")
          add_env("ACCESS_TOKEN_EXPIRE_MINUTES", "APP_ACCESS_TOKEN_EXPIRE_MINUTES")
          add_env("ALGORITHM", "APP_ALGORITHM")
          add_env("CORS_ORIGINS", "APP_CORS_ORIGINS")
          add_env("MONGODB_DB", "APP_MONGODB_DB")
          add_env("GEMINI_API_KEY", "APP_GEMINI_API_KEY")
          add_env("GEMINI_MODEL", "APP_GEMINI_MODEL")

          with open(".k8s.env", "w", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")
          PY

      - name: Ensure Artifact Registry repository exists
        shell: bash
        run: |
          if ! gcloud artifacts repositories describe "${AR_REPOSITORY}" --location "${REGION}" --project "${{ secrets.GCP_PROJECT_ID }}" > /dev/null 2>&1; then
            gcloud artifacts repositories create "${AR_REPOSITORY}" \
              --repository-format=docker \
              --location "${REGION}" \
                --description "Docker images for ${APP_BASE_NAME}" \
              --project "${{ secrets.GCP_PROJECT_ID }}"
          fi

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${AR_HOST}" --quiet

      - name: Build Docker image
        run: |
          docker build -t "${IMAGE_URI}" .

      - name: Push image to Artifact Registry
        run: |
          docker push "${IMAGE_URI}"

      - name: Ensure namespace exists
        shell: bash
        run: |
          kubectl get namespace "${K8S_NAMESPACE}" > /dev/null 2>&1 || kubectl create namespace "${K8S_NAMESPACE}"

      - name: Create or update app secrets
        shell: bash
        run: |
          kubectl -n "${K8S_NAMESPACE}" create secret generic "${SECRET_NAME}" \
            --from-env-file=.k8s.env \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy workload to GKE
        shell: bash
        run: |
          cat <<EOF | kubectl apply -n "${K8S_NAMESPACE}" -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${DEPLOYMENT_NAME}
            labels:
              app: ${POD_NAME}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: ${POD_NAME}
            template:
              metadata:
                labels:
                  app: ${POD_NAME}
              spec:
                containers:
                  - name: ${POD_NAME}
                    image: ${IMAGE_URI}
                    imagePullPolicy: Always
                    ports:
                      - containerPort: 8000
                    envFrom:
                      - secretRef:
                          name: ${SECRET_NAME}
                    resources:
                      requests:
                        cpu: "1500m"
                        memory: "6Gi"
                      limits:
                        cpu: "2000m"
                        memory: "8Gi"
                    readinessProbe:
                      httpGet:
                        path: /health
                        port: 8000
                      initialDelaySeconds: 10
                      periodSeconds: 10
                      timeoutSeconds: 2
                      failureThreshold: 6
                    livenessProbe:
                      httpGet:
                        path: /health
                        port: 8000
                      initialDelaySeconds: 30
                      periodSeconds: 15
                      timeoutSeconds: 2
                      failureThreshold: 4
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${SERVICE_NAME}
            labels:
              app: ${POD_NAME}
          spec:
            selector:
              app: ${POD_NAME}
            ports:
              - name: http
                port: 80
                targetPort: 8000
            type: LoadBalancer
          EOF

      - name: Wait for rollout
        shell: bash
        run: |
          kubectl rollout status deployment/"${DEPLOYMENT_NAME}" -n "${K8S_NAMESPACE}" --timeout=300s