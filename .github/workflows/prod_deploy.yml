name: Deploy to Cloud Run (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cloud-run-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-cloud-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Service Account Key)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Resolve deploy parameters
        shell: bash
        run: |
          REGION="${{ secrets.GCP_REGION }}"
          if [ -z "${REGION}" ]; then
            REGION="us-central1"
          fi

          SERVICE_NAME="${{ secrets.CLOUD_RUN_SERVICE }}"
          if [ -z "${SERVICE_NAME}" ]; then
            SERVICE_NAME="finance-prod"
          elif [[ "${SERVICE_NAME}" != *-prod ]]; then
            SERVICE_NAME="${SERVICE_NAME}-prod"
          fi

          AR_REPOSITORY="${SERVICE_NAME}"
          AR_HOST="${REGION}-docker.pkg.dev"
          IMAGE_URI="${AR_HOST}/${{ secrets.GCP_PROJECT_ID }}/${AR_REPOSITORY}/${SERVICE_NAME}:${{ github.sha }}"

          echo "REGION=${REGION}" >> "$GITHUB_ENV"
          echo "SERVICE_NAME=${SERVICE_NAME}" >> "$GITHUB_ENV"
          echo "AR_REPOSITORY=${AR_REPOSITORY}" >> "$GITHUB_ENV"
          echo "AR_HOST=${AR_HOST}" >> "$GITHUB_ENV"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Ensure Artifact Registry repository exists
        shell: bash
        run: |
          if ! gcloud artifacts repositories describe "${AR_REPOSITORY}" --location "${REGION}" --project "${{ secrets.GCP_PROJECT_ID }}" > /dev/null 2>&1; then
            gcloud artifacts repositories create "${AR_REPOSITORY}" \
              --repository-format=docker \
              --location "${REGION}" \
              --description "Docker images for ${SERVICE_NAME}" \
              --project "${{ secrets.GCP_PROJECT_ID }}"
          fi

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${AR_HOST}" --quiet

      - name: Build Docker image
        run: |
          docker build -t "${IMAGE_URI}" .

      - name: Push image to Artifact Registry
        run: |
          docker push "${IMAGE_URI}"

      - name: Deploy to Cloud Run
        shell: bash
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --image "${IMAGE_URI}" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8000 \
            --cpu 2 \
            --memory 4Gi \
            --cpu-boost \
            --execution-environment gen2 \
            --update-env-vars "BUILD_VERSION=${{ github.sha }}" \
            --quiet