name: Deploy to Compute Engine (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-compute-engine-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-compute-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Service Account Key)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Build GCE container env file
        shell: bash
        env:
        #   APP_PROJECT_NAME: ${{ secrets.APP_PROJECT_NAME }}
        #   APP_API_V1_STR: ${{ secrets.APP_API_V1_STR }}
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
          APP_ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.APP_ACCESS_TOKEN_EXPIRE_MINUTES }}
        #   APP_ALGORITHM: ${{ secrets.APP_ALGORITHM }}
        #   APP_CORS_ORIGINS: ${{ secrets.APP_CORS_ORIGINS }}
          APP_DEFAULT_LOGIN_PASSWORD: ${{ secrets.APP_DEFAULT_LOGIN_PASSWORD }}
          APP_MONGODB_URI: ${{ secrets.APP_MONGODB_URI }}
          APP_MONGODB_DB: ${{ secrets.APP_MONGODB_DB }}
          APP_GEMINI_API_KEY: ${{ secrets.APP_GEMINI_API_KEY }}
          APP_GEMINI_MODEL: ${{ secrets.APP_GEMINI_MODEL }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python - << 'PY'
          import os
          import sys

          # Validate required secrets are present and meet minimum requirements
          required = {
              "APP_SECRET_KEY": os.getenv("APP_SECRET_KEY", ""),
              "APP_DEFAULT_LOGIN_PASSWORD": os.getenv("APP_DEFAULT_LOGIN_PASSWORD", ""),
              "APP_MONGODB_URI": os.getenv("APP_MONGODB_URI", ""),
          }
          missing = [k for k, v in required.items() if not v]
          if missing:
              print(f"ERROR: Required secrets are not set: {', '.join(missing)}", file=sys.stderr)
              sys.exit(1)
          if len(required["APP_SECRET_KEY"]) < 32:
              print("ERROR: APP_SECRET_KEY must be at least 32 characters long.", file=sys.stderr)
              sys.exit(1)

          lines = []

          def add_env(key, env_var):
              value = os.getenv(env_var)
              if value:
                  lines.append(f"{key}={value}")

          add_env("SECRET_KEY", "APP_SECRET_KEY")
          add_env("DEFAULT_LOGIN_PASSWORD", "APP_DEFAULT_LOGIN_PASSWORD")
          add_env("MONGODB_URI", "APP_MONGODB_URI")
          lines.append(f"BUILD_VERSION={os.getenv('GITHUB_SHA', '')}")
          add_env("PROJECT_NAME", "APP_PROJECT_NAME")
          add_env("API_V1_STR", "APP_API_V1_STR")
          add_env("ACCESS_TOKEN_EXPIRE_MINUTES", "APP_ACCESS_TOKEN_EXPIRE_MINUTES")
          add_env("ALGORITHM", "APP_ALGORITHM")
          add_env("CORS_ORIGINS", "APP_CORS_ORIGINS")
          add_env("MONGODB_DB", "APP_MONGODB_DB")
          add_env("GEMINI_API_KEY", "APP_GEMINI_API_KEY")
          add_env("GEMINI_MODEL", "APP_GEMINI_MODEL")

          with open(".gce.env", "w", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")
          PY

      - name: Resolve deploy parameters
        shell: bash
        run: |
          REGION="${{ secrets.GCP_REGION }}"
          if [ -z "${REGION}" ]; then
            REGION="us-east1"
          fi
          ZONE="${{ secrets.GCP_ZONE }}"
          if [ -z "${ZONE}" ]; then
            ZONE="${REGION}-a"
          fi
          INSTANCE_NAME="${{ secrets.GCE_INSTANCE_NAME }}"
          if [ -z "${INSTANCE_NAME}" ]; then
            INSTANCE_NAME="finance-prod"
          fi

          # Use the instance name as Artifact Registry repository name to avoid extra secrets.
          AR_REPOSITORY="${INSTANCE_NAME}"

          AR_HOST="${REGION}-docker.pkg.dev"
          IMAGE_URI="${AR_HOST}/${{ secrets.GCP_PROJECT_ID }}/${AR_REPOSITORY}/${INSTANCE_NAME}:${{ github.sha }}"

          echo "REGION=${REGION}" >> "$GITHUB_ENV"
          echo "ZONE=${ZONE}" >> "$GITHUB_ENV"
          echo "INSTANCE_NAME=${INSTANCE_NAME}" >> "$GITHUB_ENV"
          echo "AR_REPOSITORY=${AR_REPOSITORY}" >> "$GITHUB_ENV"
          echo "AR_HOST=${AR_HOST}" >> "$GITHUB_ENV"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Ensure Artifact Registry repository exists
        shell: bash
        run: |
          if ! gcloud artifacts repositories describe "${AR_REPOSITORY}" --location "${REGION}" --project "${{ secrets.GCP_PROJECT_ID }}" > /dev/null 2>&1; then
            gcloud artifacts repositories create "${AR_REPOSITORY}" \
              --repository-format=docker \
              --location "${REGION}" \
              --description "Docker images for ${INSTANCE_NAME}" \
              --project "${{ secrets.GCP_PROJECT_ID }}"
          fi

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${AR_HOST}" --quiet

      - name: Build Docker image
        run: |
          docker build -t "${IMAGE_URI}" .

      - name: Push image to Artifact Registry
        run: |
          docker push "${IMAGE_URI}"

      - name: Deploy to Compute Engine
        shell: bash
        run: |
          if gcloud compute instances describe "${INSTANCE_NAME}" \
              --zone "${ZONE}" \
              --project "${{ secrets.GCP_PROJECT_ID }}" > /dev/null 2>&1; then
            gcloud compute instances update-container "${INSTANCE_NAME}" \
              --zone "${ZONE}" \
              --container-image "${IMAGE_URI}" \
              --container-env-file .gce.env \
              --project "${{ secrets.GCP_PROJECT_ID }}"
          else
            gcloud compute instances create-with-container "${INSTANCE_NAME}" \
              --zone "${ZONE}" \
              --machine-type e2-medium \
              --container-image "${IMAGE_URI}" \
              --container-env-file .gce.env \
              --container-restart-policy always \
              --tags http-server,https-server \
              --project "${{ secrets.GCP_PROJECT_ID }}"
          fi