<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 210" fill="none">
  <defs>
    <linearGradient id="arcGrad" gradientUnits="userSpaceOnUse"
                    x1="64" y1="176" x2="163" y2="47">
      <stop offset="0%"   stop-color="#192d6b"/>
      <stop offset="45%"  stop-color="#1e3f96"/>
      <stop offset="100%" stop-color="#18bba8"/>
    </linearGradient>
  </defs>

  <!-- Main arc: 270° clockwise from 7 o'clock → 4 o'clock, gap at lower-right -->
  <path d="M 64,176 A 82,82 0 1 1 176,146"
        stroke="url(#arcGrad)" stroke-width="15" stroke-linecap="round" fill="none"/>

  <!-- White swoosh under bars -->
  <path d="M 30,163 Q 80,150 132,163 Q 146,168 156,160"
        stroke="white" stroke-width="6" stroke-linecap="round"
        stroke-opacity="0.82" fill="none"/>

  <!-- 4 rising bars: heights 33/52/78/108, baseline y=163 -->
  <rect x="40"  y="130" width="16" height="33"  rx="2.5" fill="#2a4ea5"/>
  <rect x="61"  y="111" width="16" height="52"  rx="2.5" fill="#2a4ea5"/>
  <rect x="82"  y="85"  width="16" height="78"  rx="2.5" fill="#2a4ea5"/>
  <rect x="103" y="55"  width="16" height="108" rx="2.5" fill="#2a4ea5"/>

  <!-- Green trend line + solid arrowhead -->
  <line x1="35" y1="157" x2="141" y2="55"
        stroke="#22d45a" stroke-width="8" stroke-linecap="round"/>
  <polygon points="158,38 134,48 148,62" fill="#22d45a"/>

  <!-- Wallet body in arc gap (lower-right) -->
  <rect x="151" y="157" width="46" height="30" rx="10" fill="#2a4ea5"/>
  <path d="M 159,157 Q 174,146 197,157"
        stroke="#3d65cc" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="185" cy="172" r="10"  fill="white"/>
  <circle cx="185" cy="172" r="4.5" fill="#2a4ea5"/>
</svg>
